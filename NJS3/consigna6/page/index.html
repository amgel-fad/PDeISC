<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>

    <header class="main-header">
        <h1>📝 Registro de Usuario</h1>
        <button id="btn-theme" class="btn btn-theme">🌙 Modo Oscuro</button>
    </header>

    <main class="container two-columns">
        <!-- Columna izquierda: formulario -->
        <section class="form-section">
            <form id="register-form" class="register-form">
                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Perez" required pattern="[A-Za-záéíóúñÑ\s]+" title="Solo letras y espacios">
                    <small>Solo letras y espacios</small>
                </div>

                <div class="form-group">
                    <label>Género:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="genero" value="Masculino" required> Masculino</label>
                        <label><input type="radio" name="genero" value="Femenino"> Femenino</label>
                        <label><input type="radio" name="genero" value="Otro"> Otro</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="pais">País:</label>
                    <select id="pais" name="pais" required>
                        <option value="">Selecciona...</option>
                        <option value="Argentina">Argentina</option>
                        <option value="Chile">Chile</option>
                        <option value="Colombia">Colombia</option>
                        <option value="España">España</option>
                        <option value="México">México</option>
                        <option value="Perú">Perú</option>
                        <option value="Uruguay">Uruguay</option>
                        <option value="Venezuela">Venezuela</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Intereses:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="intereses" value="Deportes"> Deportes</label>
                        <label><input type="checkbox" name="intereses" value="Música"> Música</label>
                        <label><input type="checkbox" name="intereses" value="Tecnología"> Tecnología</label>
                        <label><input type="checkbox" name="intereses" value="Arte"> Arte</label>
                        <label><input type="checkbox" name="intereses" value="Lectura"> Lectura</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" name="edad" min="1" max="120" placeholder="18" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Registrar</button>
                    <button type="reset" class="btn btn-warning">Limpiar</button>
                </div>
            </form>
        </section>

        <!-- Columna derecha: registros guardados -->
        <section class="records-section">
            <h2>📋 Registros Guardados</h2>
            <div id="records-list">
                <p class="empty-message">Aún no hay registros. Completa el formulario y haz clic en "Registrar".</p>
            </div>
        </section>
    </main>

    <script src="../script/script.js"></script>
</body>
</html>

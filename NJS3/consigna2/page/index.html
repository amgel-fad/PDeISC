<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Navegación - 5 Componentes</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>🧩 Panel de Componentes</h1>
            <button id="btn-theme" class="btn btn-theme">🌙 Modo Oscuro</button>
        </div>
        <nav class="nav-menu">
            <button class="nav-btn active" data-target="comp1">Contador</button>
            <button class="nav-btn" data-target="comp2">Colores</button>
            <button class="nav-btn" data-target="comp3">Lista de Tareas</button>
            <button class="nav-btn" data-target="comp4">Reloj</button>
            <button class="nav-btn" data-target="comp5">Texto Dinámico</button>
        </nav>
    </header>

    <main class="container">
        <!-- Componente 1: Contador -->
        <section id="comp1" class="component active">
            <h2>🔢 Contador</h2>
            <p>Valor: <span id="counter-value">0</span></p>
            <div class="btn-group">
                <button class="btn btn-success" id="counter-inc">+1</button>
                <button class="btn btn-danger" id="counter-dec">-1</button>
                <button class="btn btn-warning" id="counter-reset">Reset</button>
            </div>
        </section>

        <!-- Componente 2: Colores -->
        <section id="comp2" class="component">
            <h2>🎨 Cambia el Color de Fondo</h2>
            <div id="color-box" style="width:100%; height:150px; border-radius:12px; margin-bottom:15px;"></div>
            <div class="btn-group">
                <button class="btn" style="background:#ff6b6b;" id="color-red">Rojo</button>
                <button class="btn" style="background:#4ecdc4;" id="color-teal">Verde Agua</button>
                <button class="btn" style="background:#ffe66d;" id="color-yellow">Amarillo</button>
                <button class="btn btn-primary" id="color-random">Aleatorio</button>
            </div>
        </section>

        <!-- Componente 3: Lista de Tareas (sin alerts) -->
        <section id="comp3" class="component">
            <h2>✅ Lista de Tareas</h2>
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Nueva tarea...">
                <button class="btn btn-success" id="task-add">Agregar</button>
            </div>
            <div id="task-message" style="color: #ef4444; font-size:0.9rem; min-height:1.5rem; margin-bottom:8px;"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span id="task-counter">0/10 tareas</span>
                <button class="btn btn-danger" id="task-clear-all">Borrar todas</button>
            </div>
            <div id="confirm-dialog" style="display:none; background:var(--card-bg); padding:15px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.2); margin-bottom:10px;">
                <p style="margin-bottom:10px;">¿Estás seguro de borrar <strong>todas</strong> las tareas?</p>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-danger" id="confirm-yes">Sí, borrar</button>
                    <button class="btn btn-secondary" id="confirm-no" style="background:#6b7280; color:white;">Cancelar</button>
                </div>
            </div>
            <ul id="task-list" class="task-list"></ul>
        </section>

        <!-- Componente 4: Reloj -->
        <section id="comp4" class="component">
            <h2>🕒 Reloj en Vivo</h2>
            <div id="clock" style="font-size:3rem; font-weight:bold; margin:20px 0;">--:--:--</div>
            <div class="btn-group">
                <button class="btn btn-primary" id="clock-start">Iniciar</button>
                <button class="btn btn-danger" id="clock-stop">Detener</button>
            </div>
        </section>

        <!-- Componente 5: Texto Dinámico -->
        <section id="comp5" class="component">
            <h2>📝 Texto Dinámico</h2>
            <input type="text" id="dynamic-input" placeholder="Escribe algo..." style="width:80%; padding:10px; margin-bottom:10px;">
            <p id="dynamic-output" style="font-size:1.5rem; border:1px solid #ccc; padding:15px; border-radius:8px; min-height:60px;">
                Tu texto aparecerá aquí
            </p>
            <div class="btn-group">
                <button class="btn btn-warning" id="dynamic-uppercase">Mayúsculas</button>
                <button class="btn btn-info" id="dynamic-lowercase">Minúsculas</button>
                <button class="btn btn-success" id="dynamic-clear">Limpiar</button>
            </div>
        </section>
    </main>

    <script src="../script/script.js"></script>
</body>
</html>

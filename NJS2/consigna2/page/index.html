<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consigna 2 - HTTP + FS</title>
    <style>
        /* Reset básico y variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #e9ecef;
            --bg-nav: rgba(255, 255, 255, 0.85);
            --border-nav: #ddd;
            --text-primary: #2c3e50;
            --text-secondary: #34495e;
            --text-muted: #7f8c8d;
            --card-bg: #ffffff;
            --card-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            --badge-bg: #3498db;
            --badge-color: white;
            --clima-bg: #f1c40f;
            --clima-color: #2c3e50;
            --btn-bg: #2c3e50;
            --btn-color: white;
            --btn-hover: #1a252f;
            --transition: 0.3s ease;
        }

        /* Modo noche */
        body.noche {
            --bg-body: #1e272e;
            --bg-nav: rgba(47, 54, 64, 0.85);
            --border-nav: #3d4a57;
            --text-primary: #f5f6fa;
            --text-secondary: #dcdde1;
            --text-muted: #a4b0be;
            --card-bg: #2f3640;
            --card-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            --badge-bg: #4a69bd;
            --clima-bg: #e1b12c;
            --clima-color: #1e272e;
            --btn-bg: #f5f6fa;
            --btn-color: #1e272e;
            --btn-hover: #dcdde1;
        }

        /* Estilos base */
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background var(--transition), color var(--transition);
            padding: 0 1rem;
        }

        /* Navbar */
        .navbar {
            width: 100%;
            max-width: 1200px;
            background: var(--bg-nav);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 0.8rem 1.5rem;
            border-radius: 0 0 16px 16px;
            border-bottom: 1px solid var(--border-nav);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            transition: background var(--transition), border-color var(--transition);
            margin-bottom: 1.5rem;
        }

        .navbar .info {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem 1.5rem;
            font-size: clamp(0.85rem, 2vw, 1rem);
        }

        .navbar .info .fecha {
            font-weight: 600;
            color: var(--text-primary);
            transition: color var(--transition);
            white-space: nowrap;
        }

        .navbar .info .clima {
            background: var(--clima-bg);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 600;
            color: var(--clima-color);
            font-size: 0.9rem;
            transition: background var(--transition), color var(--transition);
            white-space: nowrap;
        }

        .navbar .modo-btn {
            background: var(--btn-bg);
            color: var(--btn-color);
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 30px;
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition), color var(--transition), transform 0.1s;
            touch-action: manipulation;
            min-height: 44px; /* área táctil mínima */
        }

        .navbar .modo-btn:hover {
            background: var(--btn-hover);
            transform: scale(1.02);
        }

        .navbar .modo-btn:active {
            transform: scale(0.96);
        }

        /* Card principal */
        .card {
            background: var(--card-bg);
            padding: clamp(2rem, 5vw, 3.5rem);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            text-align: center;
            max-width: 600px;
            width: 100%;
            margin: 0 0 2rem 0;
            transition: background var(--transition), box-shadow var(--transition), color var(--transition);
        }

        .card h1 {
            color: var(--text-primary);
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            margin-bottom: 0.75rem;
            transition: color var(--transition);
            word-break: break-word;
        }

        .card p {
            color: var(--text-secondary);
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            transition: color var(--transition);
        }

        .card .badge {
            background: var(--badge-bg);
            color: var(--badge-color);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            display: inline-block;
            font-size: clamp(0.8rem, 1.5vw, 0.95rem);
            font-weight: 600;
            transition: background var(--transition), color var(--transition);
            margin-bottom: 1.2rem;
        }

        .card .footer-text {
            margin-top: 1.2rem;
            font-size: clamp(0.8rem, 1.5vw, 0.95rem);
            color: var(--text-muted);
            transition: color var(--transition);
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 480px) {
            body {
                padding: 0 0.5rem;
            }

            .navbar {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
                padding: 0.8rem 1rem;
                border-radius: 0 0 12px 12px;
            }

            .navbar .info {
                justify-content: center;
                font-size: 0.85rem;
                gap: 0.5rem;
            }

            .navbar .modo-btn {
                width: 100%;
                text-align: center;
                padding: 0.7rem;
            }

            .card {
                padding: 1.5rem;
                border-radius: 16px;
            }

            .card h1 {
                font-size: 1.4rem;
            }

            .card p {
                font-size: 0.95rem;
            }
        }

        /* Tablets y pantallas medianas */
        @media (min-width: 481px) and (max-width: 768px) {
            .navbar {
                padding: 0.8rem 1.2rem;
            }

            .card {
                padding: 2rem 1.8rem;
            }
        }

        /* Pantallas grandes */
        @media (min-width: 1200px) {
            .navbar {
                padding: 1rem 2.5rem;
            }

            .card {
                padding: 3rem 3.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- NAV -->
    <nav class="navbar">
        <div class="info">
            <span class="fecha" id="fechaActual">Cargando fecha...</span>
            <span class="clima">🌧️ clima horrible 💀</span>

        <button class="modo-btn" id="modoBtn">🌙 Modo noche</button>
    </nav>

        <span class="badge">✅ Consigna 2 completada jsjsjs</span>
        <p class="footer-text">Servidor corriendo correctamente.</p>
    </div>

</body>
</html>

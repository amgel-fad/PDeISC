<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios - JS1</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">mi formulario
        </div>
        <div class="nav-right">
            <span id="current-date"></span>
            <button id="theme-toggle" class="btn-theme">🌙 Modo Noche</button>
        </div>
    </nav>

    <main class="container">
        <section class="form-section">
            <h2>Agregar Usuario</h2>
            <form id="user-form" novalidate> <!-- novalidate para manejar los errores nosotros -->
                <div class="form-group">
                    <label for="username">Nombre Completo:</label>
                    <input type="text" id="username" name="username" required placeholder="Ej: Juan Pérez">
                    <!-- Contenedor para el mensaje de error -->
                    <span id="username-error" class="error-message"></span>
                </div>
                
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="Ej: juan@mail.com">
                </div>

                <div class="form-group">
                    <label for="role">Rol:</label>
                    <select id="role" name="role">
                        <option value="Admin">Administrador</option>
                        <option value="Developer">Desarrollador</option>
                        <option value="User">Usuario Estándar</option>
                    </select>
                </div>

                <div class="method-selector">
                    <label><strong>Forma de lectura JS:</strong></label>
                    <select id="read-method">
                        <option value="elements">1. Propiedad 'elements'</option>
                        <option value="formdata">2. Objeto 'FormData'</option>
                        <option value="individual">3. Selectores Individuales</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Registrar</button>
            </form>
        </section>

        <section class="list-section">
            <h2>Usuarios Registrados</h2>
            <div id="users-container" class="users-grid">
                <p class="empty-message">No hay usuarios registrados aún.</p>
            </div>
        </section>
    </main>

    <script src="../script/script.js"></script>
</body>
</html>
